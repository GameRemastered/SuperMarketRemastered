<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🏪 SuperMarket Remastered</title>
    <style>
        :root {
            --bg-dark: #0b3b2f;
            --panel-bg: #FEF5E7;
            --accent: #F3A738;
            --text-dark: #2A2418;
            --green: #27ae60;
            --border-style: 2px solid #4A2E14;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background: linear-gradient(135deg, var(--bg-dark) 0%, #1a5f44 100%);
            min-height: 100vh;
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        .game-wrapper {
            max-width: 900px;
            width: 100%;
            background: var(--panel-bg);
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: var(--border-style);
        }

        /* HEADER TERPUSAT & RAPI */
        .top-bar {
            background: #2A2418;
            padding: 15px;
            display: grid;
            grid-template-columns: 60px 1fr 100px; /* Level | Uang | Upgrade */
            align-items: center;
            border-bottom: 4px solid var(--accent);
            gap: 10px;
        }

        .level-tag {
            background: var(--accent);
            color: #fff;
            padding: 5px;
            font-weight: 900;
            font-size: 0.8rem;
            border-radius: 4px;
            text-align: center;
            border: 1px solid #4A2E14;
        }

        .cash-container {
            display: flex;
            justify-content: center;
        }

        .cash-display {
            background: #1E1912;
            padding: 8px 20px;
            border: 2px solid #F7D44A;
            color: #FFD966;
            font-weight: 900;
            font-size: 1.2rem;
            text-align: center;
            border-radius: 8px;
            box-shadow: inset 0 0 10px rgba(255,217,102,0.2);
            min-width: 140px;
        }

        /* DASHBOARD */
        .dashboard {
            padding: 15px;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 15px;
        }

        @media (max-width: 768px) {
            .dashboard { grid-template-columns: 1fr; }
            .top-bar { grid-template-columns: 50px 1fr 80px; padding: 10px; }
            .cash-display { font-size: 1rem; padding: 6px 10px; min-width: 110px; }
        }

        .panel {
            background: white;
            border-radius: 8px;
            padding: 15px;
            border: 1px solid #ddd;
        }

        h2 { font-size: 1rem; margin-bottom: 12px; border-left: 4px solid var(--accent); padding-left: 8px; color: var(--text-dark); }

        /* INPUTS & BUTTONS KOTAK */
        select, input, button { border-radius: 4px; border: 1px solid #ccc; font-weight: bold; outline: none; }

        .buy-controls { display: grid; grid-template-columns: 1fr 60px; gap: 8px; margin-bottom: 10px; }

        .btn-main {
            background: var(--green);
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
            box-shadow: 0 3px 0 #1C5A3A;
            font-size: 0.9rem;
        }

        .btn-main:active { transform: translateY(2px); box-shadow: 0 1px 0 #1C5A3A; }

        /* Refresh Button */
        .refresh-area {
            display: flex;
            justify-content: center;
            margin: 10px 15px;
        }
        .btn-refresh {
            background: #3498db;
            color: white;
            border: none;
            padding: 8px 20px;
            cursor: pointer;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.85rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: all 0.2s;
        }
        .btn-refresh:active { transform: scale(0.98); }

        /* LISTS */
        .row-card {
            display: grid;
            grid-template-columns: 30px 1fr 70px 60px;
            align-items: center;
            background: #fdfdfd;
            padding: 8px;
            border: 1px solid #eee;
            margin-bottom: 5px;
            gap: 10px;
        }

        .shelf-card {
            background: #fff;
            padding: 12px;
            border: 1px solid #eee;
            margin-bottom: 10px;
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            gap: 10px;
        }

        .price-tag { display: flex; align-items: center; background: #eee; padding: 2px; }
        .price-tag button { width: 32px; height: 32px; background: #333; color: white; border: none; cursor: pointer; font-size: 1.2rem; }
        .price-tag span { width: 65px; text-align: center; font-weight: bold; font-size: 0.9rem; }

        .info-sub { font-size: 0.8rem; color: #777; margin-top: 4px; }
        .speed-val { color: #d35400; font-weight: bold; }

        footer { background: #2A2418; color: #777; text-align: center; padding: 8px; font-size: 0.7rem; }
        
        /* Auto-save indicator kecil */
        .save-badge {
            position: fixed;
            bottom: 15px;
            right: 15px;
            background: rgba(0,0,0,0.6);
            color: #0f0;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 20px;
            font-family: monospace;
            pointer-events: none;
            z-index: 999;
            backdrop-filter: blur(4px);
        }
    </style>
</head>

    let playerMoney = 5000.0;
    let storeLevel = 1;
    let cardStock = {};
    let shelf = {};
    let maxCap = 20;
    
    // ==================== INISIALISASI DINAMIS ====================
    function initializeDynamicData() {
        // Inisialisasi cardStock untuk semua produk di catalog
        const newCardStock = {};
        for(let id in PRODUCT_CATALOG) {
            if(cardStock[id] === undefined) {
                newCardStock[id] = 0;
            } else {
                newCardStock[id] = cardStock[id];
            }
        }
        cardStock = newCardStock;
        
        // Inisialisasi shelf untuk semua produk
        const newShelf = {};
        for(let id in PRODUCT_CATALOG) {
            if(shelf[id] === undefined) {
                newShelf[id] = { stock: 0, price: PRODUCT_CATALOG[id].base * 1.2, timerId: null };
            } else {
                newShelf[id] = { ...shelf[id], timerId: null };
            }
        }
        shelf = newShelf;
    }
    
    // ==================== SISTEM DATABASE & AUTO SAVE ====================
    function saveGameToDB() {
        try {
            const saveData = {
                playerMoney: playerMoney,
                storeLevel: storeLevel,
                cardStock: { ...cardStock },
                shelf: {},
                maxCap: maxCap,
                version: "2.2"
            };
            
            for(let id in shelf) {
                saveData.shelf[id] = { stock: shelf[id].stock, price: shelf[id].price };
            }
            
            localStorage.setItem("SuperMarketTycoon_Save", JSON.stringify(saveData));
            const indicator = document.getElementById('saveIndicator');
            if(indicator) {
                indicator.style.opacity = '1';
                indicator.innerText = '💾 Tersimpan!';
                setTimeout(() => {
                    if(indicator) indicator.innerText = '💾 Auto-Save';
                }, 1200);
            }
        } catch(e) { console.warn("Auto save gagal", e); }
    }
    
    function loadGameFromDB() {
        const raw = localStorage.getItem("SuperMarketTycoon_Save");
        if(!raw) return false;
        try {
            const data = JSON.parse(raw);
            if(data.version && (data.version === "2.1" || data.version === "2.2")) {
                playerMoney = data.playerMoney;
                storeLevel = data.storeLevel;
                maxCap = data.maxCap;
                
                // Load cardStock
                if(data.cardStock) {
                    cardStock = { ...data.cardStock };
                }
                
                // Load shelf
                if(data.shelf) {
                    for(let id in data.shelf) {
                        if(shelf[id]) {
                            shelf[id].stock = data.shelf[id].stock;
                            shelf[id].price = data.shelf[id].price;
                        }
                    }
                }
                return true;
            }
        } catch(e) { console.warn("Gagal load save", e); }
        return false;
    }
    
    function clearAllTimers() {
        for(let id in shelf) {
            if(shelf[id].timerId) {
                clearInterval(shelf[id].timerId);
                clearTimeout(shelf[id].timerId);
                shelf[id].timerId = null;
            }
        }
    }
    
    function restartAllSelling() {
        for(let id in shelf) {
            if(shelf[id].stock > 0) {
                startSelling(id);
            }
        }
    }
    
    function startSelling(id) {
        if(shelf[id].timerId) {
            clearTimeout(shelf[id].timerId);
            shelf[id].timerId = null;
        }
        if(shelf[id].stock <= 0) return;
        
        function sellStep() {
            if(shelf[id].stock > 0) {
                shelf[id].stock--;
                playerMoney += shelf[id].price;
                updateUI();
                if(shelf[id].stock > 0) {
                    const speedSec = calculateSpeed(id);
                    shelf[id].timerId = setTimeout(() => {
                        sellStep();
                    }, speedSec * 1000);
                } else {
                    shelf[id].timerId = null;
                }
            } else {
                shelf[id].timerId = null;
            }
        }
        
        const firstDelay = calculateSpeed(id) * 1000;
        shelf[id].timerId = setTimeout(() => {
            sellStep();
        }, firstDelay);
    }
    
    function calculateSpeed(id) {
        const p = PRODUCT_CATALOG[id];
        if(!p) return 5;
        let ratio = shelf[id].price / p.base;
        let speed = 3.5 * Math.pow(ratio, 2.8); 
        return Math.min(60, Math.max(0.5, speed));
    }
    
    function updateUI() {
        document.getElementById('moneyUI').innerText = '$' + formatMoney(playerMoney);
        document.getElementById('storeLevelUI').innerText = `Lv.${storeLevel}`;
        
        // Update Gudang (cardStock)
        const invContainer = document.getElementById('inventoryContainer');
        invContainer.innerHTML = '';
        for(let id in cardStock) {
            if(cardStock[id] > 0 && PRODUCT_CATALOG[id]) {
                invContainer.innerHTML += `
                <div class="row-card">
                    <span>${PRODUCT_CATALOG[id].icon}</span>
                    <span style="font-weight:bold;">${PRODUCT_CATALOG[id].name}</span>
                    <span style="color:#666; font-size:0.75rem;">${cardStock[id]} Box</span>
                    <button style="background:var(--accent); border:none; padding:4px; font-size:0.7rem; cursor:pointer;" onclick="openBox('${id}')">BUKA</button>
                </div>`;
            }
        }

        // Update Rak Toko (shelf)
        const shelfContainer = document.getElementById('shelfList');
        shelfContainer.innerHTML = '';
        let total = 0;
        for(let id in shelf) {
            if(!PRODUCT_CATALOG[id]) continue;
            total += shelf[id].stock;
            const s = shelf[id];
            const speed = s.stock > 0 ? calculateSpeed(id).toFixed(1) : 0;
            shelfContainer.innerHTML += `
                <div class="shelf-card">
                    <div>
                        <div style="font-weight:bold; font-size:0.95rem;">${PRODUCT_CATALOG[id].icon} ${PRODUCT_CATALOG[id].name}</div>
                        <div class="info-sub">Stok: ${s.stock} | <span class="speed-val">⏱️ ${speed}s</span></div>
                    </div>
                    <div class="price-tag">
                        <button onclick="changePrice('${id}', -0.1)">-</button>
                        <span>$${s.price.toFixed(2)}</span>
                        <button onclick="changePrice('${id}', 0.1)">+</button>
                    </div>
                </div>`;
        }
        
        // Kapasitas maksimal 1.000.000.000
        const maxCapDisplay = Math.min(maxCap, 1000000000);
        document.getElementById('capUI').innerHTML = `${total}/${maxCapDisplay}`;
        
        const upgradeCost = storeLevel * 300;
        document.getElementById('upgradeCostUI').innerText = formatMoney(upgradeCost);
        
        saveGameToDB();
    }
    
    window.openBox = (id) => {
        const u = PRODUCT_CATALOG[id].units;
        let total = 0; 
        for(let i in shelf) total += shelf[i].stock;
        const maxAllowed = Math.min(maxCap, 1000000000);
        if(total + u > maxAllowed) {
            alert(`Rak Penuh! Kapasitas maksimal ${maxAllowed}`);
            return;
        }
        if(cardStock[id] <= 0) return;
        cardStock[id]--;
        shelf[id].stock += u;
        startSelling(id);
        updateUI();
    };

    window.changePrice = (id, delta) => {
        shelf[id].price = Math.max(0.1, shelf[id].price + delta);
        if(shelf[id].stock > 0) {
            startSelling(id);
        }
        updateUI();
    };
    
    // ==================== REFRESH DATABASE ====================
    function refreshDatabase() {
        // Simpan state lama yang penting
        const oldCardStock = { ...cardStock };
        const oldShelf = {};
        for(let id in shelf) {
            if(shelf[id]) {
                oldShelf[id] = { stock: shelf[id].stock, price: shelf[id].price };
            }
        }
        const oldMoney = playerMoney;
        const oldLevel = storeLevel;
        const oldMaxCap = maxCap;
        
        // Hentikan semua timer
        clearAllTimers();
        
        // Inisialisasi ulang data dengan mempertahankan stok dan harga yang ada
        // Tapi pastikan semua produk baru dari catalog masuk
        const newCardStock = {};
        const newShelf = {};
        
        for(let id in PRODUCT_CATALOG) {
            // Pertahankan stok kardus yang ada
            if(oldCardStock[id] !== undefined) {
                newCardStock[id] = oldCardStock[id];
            } else {
                newCardStock[id] = 0;
            }
            
            // Pertahankan stok rak dan harga yang ada
            if(oldShelf[id] !== undefined) {
                newShelf[id] = { 
                    stock: oldShelf[id].stock, 
                    price: oldShelf[id].price,
                    timerId: null 
                };
            } else {
                newShelf[id] = { 
                    stock: 0, 
                    price: PRODUCT_CATALOG[id].base * 1.2,
                    timerId: null 
                };
            }
        }
        
        cardStock = newCardStock;
        shelf = newShelf;
        playerMoney = oldMoney;
        storeLevel = oldLevel;
        maxCap = oldMaxCap;
        
        // Pastikan maxCap tidak melebihi 1.000.000.000
        if(maxCap > 1000000000) maxCap = 1000000000;
        
        // Update UI
        updateUI();
        
        // Restart penjualan
        restartAllSelling();
        
        // Tampilkan notifikasi
        const indicator = document.getElementById('saveIndicator');
        if(indicator) {
            indicator.innerText = '🔄 Database Refresh!';
            indicator.style.opacity = '1';
            setTimeout(() => {
                if(indicator) indicator.innerText = '💾 Auto-Save';
            }, 2000);
        }
        
        // Simpan setelah refresh
        saveGameToDB();
        
        alert("Database berhasil direfresh! Semua produk baru telah ditambahkan ke sistem.");
    }
    
    // Beli kardus
    document.getElementById('buyCardAction').onclick = () => {
        const id = document.getElementById('productType').value;
        const qty = parseInt(document.getElementById('cardAmount').value) || 1;
        if(!PRODUCT_CATALOG[id]) {
            alert("Produk tidak ditemukan!");
            return;
        }
        const cost = PRODUCT_CATALOG[id].cost * qty;
        if(playerMoney >= cost) {
            playerMoney -= cost;
            cardStock[id] = (cardStock[id] || 0) + qty;
            updateUI();
        } else alert("Uang tidak cukup!");
    };
    
    // Upgrade toko dengan batas maksimal kapasitas 1.000.000.000
    document.getElementById('upgradeBtn').onclick = () => {
        if(maxCap >= 1000000000) {
            alert("Kapasitas rak sudah mencapai maksimum 1.000.000.000!");
            return;
        }
        const cost = storeLevel * 300;
        if(playerMoney >= cost) {
            playerMoney -= cost;
            storeLevel++;
            let newCap = maxCap + 15;
            if(newCap > 1000000000) newCap = 1000000000;
            maxCap = newCap;
            updateUI();
        } else {
            alert("Uang tidak cukup untuk upgrade!");
        }
    };
    
    // Refresh Database Button
    document.getElementById('refreshDatabaseBtn').onclick = () => {
        if(confirm("Refresh database akan menambahkan semua produk baru ke sistem tanpa menghapus progress Anda. Lanjutkan?")) {
            refreshDatabase();
        }
    };
    
    // Helper format money
    function formatMoney(num) {
        if (num >= 1e12) return (num / 1e12).toFixed(1) + 'T';
        if (num >= 1e9) return (num / 1e9).toFixed(1) + 'B';
        if (num >= 1e6) return (num / 1e6).toFixed(1) + 'M';
        if (num >= 1e3) return (num / 1e3).toFixed(1) + 'K';
        return num.toFixed(2);
    }
    
    // Inisialisasi Game
    function initGameWithDatabase() {
        initializeDynamicData();
        const loaded = loadGameFromDB();
        
        clearAllTimers();
        
        if(!loaded) {
            // Reset ke default jika tidak ada save
            playerMoney = 5000.0;
            storeLevel = 1;
            maxCap = 20;
            for(let id in cardStock) cardStock[id] = 0;
            for(let id in shelf) {
                shelf[id].stock = 0;
                shelf[id].price = PRODUCT_CATALOG[id].base * 1.2;
            }
        }
        
        // Pastikan maxCap tidak melebihi batas
        if(maxCap > 1000000000) maxCap = 1000000000;
        
        updateUI();
        restartAllSelling();
    }
    
    // Auto-save interval
    setInterval(() => {
        saveGameToDB();
    }, 5000);
    
    window.addEventListener('beforeunload', () => {
        saveGameToDB();
    });
    
    // Jalankan game
    initGameWithDatabase();
</script>
</body>
</html>
